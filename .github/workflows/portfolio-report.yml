name: 持仓分析报告

on:
  schedule:
    - cron: '0 2 * * 1-5'    # 工作日北京时间 10:00 (UTC 02:00)
  workflow_dispatch:             # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests

      - name: 配置飞书环境变量
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # 创建配置文件
          cat > market_monitor/config.py << 'EOF'
          import os
          FEISHU_WEBHOOK = os.getenv("FEISHU_WEBHOOK", "")
          FEISHU_APP_ID = ""
          FEISHU_APP_SECRET = ""
          FEISHU_CHAT_ID = ""
          EOF

      - name: 执行持仓分析（带重试机制）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python market_monitor/report/portfolio_analyzer.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_number }}
          path: portfolio_report_*.md
          retention-days: 30
