name: 持仓分析报告

on:
  schedule:
    - cron: '30 2 * * 1-5'    # 工作日北京时间 10:30 (UTC 02:30) - 持仓分析
  workflow_dispatch:             # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests tushare akshare

      - name: 配置Python环境变量
        run: |
          # 创建 .env 文件供 Python 脚本使用
          cat > .env << EOF
          TUSHARE_TOKEN=${TUSHARE_TOKEN}
          FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
          EOF
          echo "环境变量文件已创建"

      - name: 执行持仓分析 + 飞书推送
        run: |
          echo "检查环境变量..."
          echo "FEISHU_APP_ID 是否存在: $(if [ -n "$FEISHU_APP_ID" ]; then echo "yes (长度:${#FEISHU_APP_ID})"; else echo "no"; fi)"
          echo "FEISHU_APP_SECRET 是否存在: $(if [ -n "$FEISHU_APP_SECRET" ]; then echo "yes (长度:${#FEISHU_APP_SECRET})"; else echo "no"; fi)"
          echo "FEISHU_WEBHOOK 是否存在: $(if [ -n "$FEISHU_WEBHOOK" ]; then echo "yes"; else echo "no"; fi)"
          # 执行报告生成（包含飞书文档 + 飞书卡片消息）
          python -m market_monitor.report.portfolio_professional --feishu

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_number }}
          path: portfolio_report_*.md
          retention-days: 30
