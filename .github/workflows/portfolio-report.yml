name: 持仓分析报告

on:
  schedule:
    - cron: '30 2 * * 1-5'    # 工作日北京时间 10:30 (UTC 02:30) - 持仓分析
  workflow_dispatch:             # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests tushare akshare

      - name: 配置Python环境变量
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          # 创建 .env 文件供 Python 脚本使用
          cat > .env << EOF
          TUSHARE_TOKEN=${TUSHARE_TOKEN}
          FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
          EOF
          echo "环境变量文件已创建"

      - name: 配置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装 lark-cli
        run: npm install -g @larksuite/cli

      - name: 配置 lark-cli
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          mkdir -p ~/.lark-cli
          cat > ~/.lark-cli/config.json << EOF
          {
            "appId": "${LARK_APP_ID}",
            "appSecret": "${LARK_APP_SECRET}",
            "brand": "feishu"
          }
          EOF

      - name: 执行持仓分析（带重试机制 + 飞书推送）
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: |
            # 设置 Tushare token（如果提供）
            if [ -n "$TUSHARE_TOKEN" ]; then
              python -c "import tushare as ts; ts.set_token('$TUSHARE_TOKEN')"
            fi
            # 执行报告生成（包含飞书文档 + 飞书卡片消息）
            python -m market_monitor.report.portfolio_professional --feishu

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-report-${{ github.run_number }}
          path: portfolio_report_*.md
          retention-days: 30
