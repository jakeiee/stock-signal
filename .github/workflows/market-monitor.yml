name: 市场监控日报

on:
  schedule:
    - cron: '30 1 * * 1-5'    # 工作日北京时间 09:30 (UTC 01:30)
  workflow_dispatch:             # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests

      - name: 执行市场监控
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          retry_wait_seconds: 60
          command: python -m market_monitor --feishu

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_number }}
          path: market_report_*.md
          retention-days: 30
