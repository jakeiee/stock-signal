name: 红利指数监控

on:
  schedule:
    - cron: '0 1 * * 1-5'    # 工作日北京时间 09:00 (UTC 01:00)
  workflow_dispatch:             # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests

      - name: 配置飞书环境变量
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          cat > market_monitor/config.py << 'EOF'
          import os
          FEISHU_WEBHOOK = os.getenv("FEISHU_WEBHOOK", "")
          FEISHU_APP_ID = ""
          FEISHU_APP_SECRET = ""
          FEISHU_CHAT_ID = ""
          EOF

      - name: 执行红利指数监控
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 60
          command: python dividend_monitor/main.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: dividend-report-${{ github.run_number }}
          path: dividend_report_*.md
          retention-days: 30
