name: 选股持仓分析报告

on:
  schedule:
    # 工作日北京时间 16:00 (UTC 08:00) - 收盘后选股分析
    - cron: '0 8 * * 1-5'
  workflow_dispatch:             # 支持手动触发

jobs:
  selection:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: LARK_APP  # 使用 Environment secrets
    
    env:
      FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
      FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安装依赖（清华镜像源）
        run: |
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install xalpha pandas numpy requests tushare akshare

      - name: 配置环境变量
        run: |
          cat > .env << EOF
          TUSHARE_TOKEN=${TUSHARE_TOKEN}
          FEISHU_WEBHOOK=${FEISHU_WEBHOOK}
          EOF
          echo "环境变量文件已创建"

      - name: 执行选股分析 + 飞书推送
        run: |
          echo "=== 选股持仓管理系统 ==="
          echo "FEISHU_APP_ID 是否存在: $(if [ -n "$FEISHU_APP_ID" ]; then echo "yes (长度:${#FEISHU_APP_ID})"; else echo "no"; fi)"
          echo "FEISHU_WEBHOOK 是否存在: $(if [ -n "$FEISHU_WEBHOOK" ]; then echo "yes"; else echo "no"; fi)"
          # 执行选股流程并推送到飞书（最多分析50只）
          python -m market_monitor.portfolio_selection_workflow --feishu --max 50

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: selection-report-${{ github.run_number }}
          path: portfolio_report_*.md
          retention-days: 30
